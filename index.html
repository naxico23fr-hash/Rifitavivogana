<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Rifa En Vivo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:#0b1220;
  color:white;
  font-family:Arial, sans-serif;
  text-align:center;
}

header{
  background:#111a2e;
  padding:15px;
  font-size:22px;
  font-weight:bold;
}

.container{
  padding:15px;
}

/* 🎥 Short vertical */
.videoShort{
  width:320px;
  height:570px;
  max-width:95%;
  border-radius:12px;
  border:none;
}

/* 💬 Chat */
#chatBox{
  max-width:900px;
  margin:20px auto;
  background:#111a2e;
  border-radius:12px;
  padding:10px;
}

#messages{
  height:200px;
  overflow-y:auto;
  background:#0b1220;
  padding:10px;
  border-radius:8px;
  text-align:left;
}

input,button{
  padding:10px;
  border-radius:8px;
  border:none;
  margin:5px;
}

button{
  background:#22c55e;
  color:white;
  font-weight:bold;
}

.badge{
  background:#ef4444;
  padding:6px 10px;
  border-radius:8px;
  font-size:14px;
}
</style>
</head>

<body>

<header>
🔴 Rifa en Vivo
<span class="badge" id="viewers">0 viendo</span>
</header>

<div class="container">

<!-- 🎥 SHORT DE YOUTUBE -->
<iframe
  class="videoShort"
  src="https://www.youtube.com/embed/rBhvXxgcrqo?autoplay=1&mute=1"
  allow="autoplay; encrypted-media"
  allowfullscreen>
</iframe>

<!-- 💬 CHAT -->
<div id="chatBox">
  <h3>💬 Chat en vivo</h3>
  <div id="messages"></div>
  <input id="name" placeholder="Tu nombre">
  <input id="msg" placeholder="Escribe mensaje">
  <button onclick="sendMsg()">Enviar</button>
</div>

</div>

<!-- 🔥 FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  serverTimestamp,
  doc,
  setDoc
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBg1ziZ3KJtPkkngbqWNAkb-Rid63iD4eY",
  authDomain: "larifita-en-vivo.firebaseapp.com",
  projectId: "larifita-en-vivo",
  storageBucket: "larifita-en-vivo.firebasestorage.app",
  messagingSenderId: "322041084776",
  appId: "1:322041084776:web:a382be49b50c98a7eab4dd"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

////////////////////////////////////////////////////
// 👁 CONTADOR DE ESPECTADORES
////////////////////////////////////////////////////
const viewerRef = doc(db,"live","viewer_"+Math.random());
await setDoc(viewerRef,{online:true});

onSnapshot(collection(db,"live"),snap=>{
  document.getElementById("viewers").textContent =
    snap.size + " viendo";
});

////////////////////////////////////////////////////
// 💬 CHAT
////////////////////////////////////////////////////
const chatRef = collection(db,"chat");

window.sendMsg = async function(){
  const name=document.getElementById("name").value || "Anónimo";
  const msg=document.getElementById("msg").value;
  if(!msg) return;

  await addDoc(chatRef,{
    name,
    msg,
    time:serverTimestamp()
  });

  document.getElementById("msg").value="";
};

onSnapshot(chatRef,snap=>{
  const box=document.getElementById("messages");
  box.innerHTML="";
  snap.forEach(d=>{
    const data=d.data();
    box.innerHTML += `<div><b>${data.name}:</b> ${data.msg}</div>`;
  });
  box.scrollTop=box.scrollHeight;
});
</script>

</body>
</html>

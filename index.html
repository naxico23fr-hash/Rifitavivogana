<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Rifa en Vivo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:#0b1220;
  color:white;
  font-family:Arial, sans-serif;
  text-align:center;
}

header{
  background:#111a2e;
  padding:15px;
  font-size:22px;
  font-weight:bold;
}

/* 🎥 VIDEO */
.video-box{ padding:15px; }

iframe{
  width:95%;
  max-width:900px;
  height:500px;
  border:none;
  border-radius:12px;
}

/* 🎟️ RIFA */
.rifa{ padding:20px; }

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(55px,1fr));
  gap:8px;
  max-width:900px;
  margin:20px auto;
}

.numero{
  background:#1f2a44;
  border:2px solid #2f3f66;
  padding:12px 0;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  transition:.2s;
}

.numero:hover{ background:#22c55e; }

.vendido{
  background:#ef4444 !important;
  cursor:not-allowed;
  opacity:.6;
}

/* 🏆 GANADORES */
.ganadores{
  max-width:900px;
  margin:30px auto;
  background:#111a2e;
  border-radius:12px;
  padding:15px;
  text-align:left;
}

.ganador-item{
  background:#0b1220;
  padding:10px;
  border-radius:8px;
  margin:6px 0;
}

/* 🔐 ADMIN */
.admin-btn{
  position:fixed;
  bottom:15px;
  right:15px;
  background:#ef4444;
  padding:12px 16px;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
}

.admin-panel{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.8);
  align-items:center;
  justify-content:center;
}

.admin-box{
  background:#111a2e;
  padding:25px;
  border-radius:12px;
  width:320px;
}

input,button{
  width:90%;
  padding:10px;
  margin:6px;
  border:none;
  border-radius:8px;
}

button{
  background:#22c55e;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.estado{ margin-top:10px; font-weight:bold; }
</style>
</head>

<body>

<header>🔴 Rifa en Vivo</header>

<!-- 🎥 VIDEO -->
<div class="video-box">
<iframe
  src="https://www.youtube.com/embed/VIDEO_ID_AQUI?autoplay=1"
  allow="autoplay; encrypted-media"
  allowfullscreen>
</iframe>
</div>

<!-- 🎟️ RIFA -->
<section class="rifa">
<h2>Elige tu número</h2>
<div id="grid" class="grid"></div>
</section>

<!-- 🏆 GANADORES -->
<section class="ganadores">
<h2>🏆 Ganadores</h2>
<div id="listaGanadores"></div>
</section>

<!-- 🔐 BOTON ADMIN -->
<div class="admin-btn" onclick="openAdmin()">ADMIN</div>

<!-- 🔐 PANEL ADMIN -->
<div id="adminPanel" class="admin-panel">
  <div class="admin-box">

    <h3>🔐 Admin</h3>

    <input id="adminPin" placeholder="PIN admin">

    <hr>

    <b>Marcar número vendido</b>
    <input id="numAdmin" placeholder="Número (ej: 001)">
    <input id="compradorAdmin" placeholder="Nombre comprador">
    <button onclick="marcarVendido()">Guardar venta</button>

    <hr>

    <b>Publicar ganador</b>
    <input id="premioAdmin" placeholder="Premio">
    <input id="ganadorAdmin" placeholder="Nombre ganador">
    <input id="numeroGanadorAdmin" placeholder="Número ganador">
    <button onclick="publicarGanador()">Publicar ganador</button>

    <button onclick="closeAdmin()" style="background:#ef4444">Cerrar</button>

    <p id="adminMsg" class="estado"></p>

  </div>
</div>

<!-- 🔥 FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  doc,
  setDoc,
  onSnapshot,
  serverTimestamp,
  collection,
  addDoc,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* ===== CONFIGURA ===== */

const WHATSAPP = "569XXXXXXXX";
const ADMIN_PIN = "12345";

const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_AUTH_DOMAIN",
  projectId: "TU_PROJECT_ID"
};

/* ===================== */

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const grid = document.getElementById("grid");

/* 🎟️ CREAR NUMEROS */
for(let i=1;i<=200;i++){

  const id = i.toString().padStart(3,"0");

  const div=document.createElement("div");
  div.className="numero";
  div.textContent=id;

  div.onclick=()=>{
    if(div.classList.contains("vendido")) return;

    const msg=encodeURIComponent(
      "Hola, quiero comprar el número "+id+" de la rifa"
    );

    window.open(`https://wa.me/${WHATSAPP}?text=${msg}`,"_blank");
  };

  grid.appendChild(div);

  onSnapshot(doc(db,"rifa",id),(snap)=>{
    if(snap.exists() && snap.data().vendido){
      div.classList.add("vendido");
    }
  });
}

/* 🏆 GANADORES EN VIVO */
const listaGanadores=document.getElementById("listaGanadores");

const q=query(collection(db,"ganadores"), orderBy("fecha","desc"));

onSnapshot(q,(snap)=>{
  listaGanadores.innerHTML="";
  snap.forEach(d=>{
    const g=d.data();
    listaGanadores.innerHTML+=`
      <div class="ganador-item">
        🏆 <b>${g.premio}</b><br>
        👤 ${g.nombre}<br>
        🎟️ Nº ${g.numero}
      </div>
    `;
  });
});

/* 🔐 ADMIN UI */
window.openAdmin=()=>{ adminPanel.style.display="flex"; };
window.closeAdmin=()=>{ adminPanel.style.display="none"; };

/* 🔐 VENTA */
window.marcarVendido=async()=>{
  const pin=adminPin.value;
  let numero=numAdmin.value.trim();
  const comprador=compradorAdmin.value || "Cliente";

  if(pin!==ADMIN_PIN){
    adminMsg.textContent="❌ PIN incorrecto";
    return;
  }

  numero=numero.padStart(3,"0");

  await setDoc(doc(db,"rifa",numero),{
    vendido:true,
    comprador,
    fecha:serverTimestamp()
  });

  adminMsg.textContent="✅ Venta guardada";
};

/* 🏆 PUBLICAR GANADOR */
window.publicarGanador=async()=>{
  if(adminPin.value!==ADMIN_PIN){
    adminMsg.textContent="❌ PIN incorrecto";
    return;
  }

  await addDoc(collection(db,"ganadores"),{
    premio:premioAdmin.value,
    nombre:ganadorAdmin.value,
    numero:numeroGanadorAdmin.value,
    fecha:serverTimestamp()
  });

  adminMsg.textContent="🏆 Ganador publicado";
};
</script>

</body>
</html>
